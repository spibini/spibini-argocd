name: GitOps Kustomize Validate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate Overlays and Build Table
        id: validate
        run: |
          echo "REPORT<<EOF" >> $GITHUB_ENV
          echo "### 🔍 Kustomize Build Validation Report" >> $GITHUB_ENV
          echo "| Application Overlay | Status | Message |" >> $GITHUB_ENV
          echo "| :--- | :--- | :--- |" >> $GITHUB_ENV

          FAILED=0
          while read -r dir; do
            if kustomize build "$dir" > /dev/null 2>&1; then
              echo "| \`$dir\` | ✅ PASS | Build Successful |" >> $GITHUB_ENV
            else
              ERROR_MSG=$(kustomize build "$dir" 2>&1 | head -n 1 | sed 's/|/ /g')
              echo "| \`$dir\` | ❌ FAIL | $ERROR_MSG |" >> $GITHUB_ENV
              FAILED=1
            fi
          done < <(find apps -name "kustomization.yml" -o -name "kustomization.yaml" | xargs -I {} dirname {} | sort)

          echo "EOF" >> $GITHUB_ENV
          echo "is_failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Post Comment to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: kustomize-validation
          message: ${{ env.REPORT }}

      - name: Final Check
        if: steps.validate.outputs.is_failed == '1'
        run: exit 1
