name: Auto Preview Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/**"

jobs:
  label-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Apps
        id: detect-apps
        run: |
          CHANGED_APPS=$(git diff --name-only origin/main...HEAD | grep '^apps/' | cut -d'/' -f2 | sort -u | xargs)
          echo "apps=$CHANGED_APPS" >> $GITHUB_OUTPUT
          echo "Detected apps: $CHANGED_APPS"

      - name: Update PR Labels
        uses: actions/github-script@v7
        with:
          script: |
            const changedApps = "${{ steps.detect-apps.outputs.apps }}".split(' ').filter(Boolean);
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const label of currentLabels) {
              if (label.name.startsWith('preview:')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name
                });
              }
            }

            if (changedApps.length > 0) {
              const labelsToAdd = changedApps.map(app => `preview:${app}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd
              });
            }
