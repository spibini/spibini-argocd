apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-image-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-image-server
  template:
    metadata:
      labels:
        app: nginx-image-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: image-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: config-volume
          configMap:
            name: nginx-config
        - name: image-storage
          hostPath:
            path: /tmp/placeholder
