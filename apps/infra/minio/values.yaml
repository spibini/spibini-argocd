image:
  repository: quay.io/minio/minio
  tag: RELEASE.2025-07-23T15-54-02Z
  pullPolicy: IfNotPresent

mcImage:
  repository: quay.io/minio/mc
  tag: RELEASE.2025-07-21T05-28-28Z
  pullPolicy: IfNotPresent

rootUser: "minio-admin"
rootPassword: "changeme-strong-password"

mode: standalone
replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: NodePort
  port: 9001
  nodePort: 30900

buckets:
  - name: linkat-images
    policy: none
    purge: false
  - name: linkat-screenshots
    policy: none
    purge: false

metrics:
  serviceMonitor:
    enabled: false