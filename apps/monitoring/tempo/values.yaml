tempo:
  reportingEnabled: false

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  server:
    http_listen_port: 3200

  retention: 168h   # 7일

persistence:
  enabled: true
  size: 10Gi
  storageClass: "" 

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  annotations: {}
  port: 3200 