mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib

securityContext:
  runAsUser: 0
  runAsGroup: 0

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: false

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

extraVolumes:
  - name: filelogreceiver-storage
    hostPath:
      path: /var/lib/otelcol/filelogreceiver
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: filelogreceiver-storage
    mountPath: /var/lib/otelcol/filelogreceiver

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    file_storage:
      directory: /var/lib/otelcol/filelogreceiver

  receivers:
    filelog:
      storage: file_storage
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/monitoring_otel-collector-opentelemetry-collector*_*/opentelemetry-collector/*.log
      include_file_name: false
      include_file_path: true
      operators:
        - id: container-parser
          max_log_size: 102400
          type: container
      retry_on_failure:
        enabled: true
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1000
    memory_limiter:
      check_interval: 1s
      limit_mib: 256
      limit_percentage: 80
      spike_limit_mib: 64
      spike_limit_percentage: 25
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      filter:
        node_from_env_var: K8S_NODE_NAME
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.deployment.name
        labels:
          - from: pod
            key_regex: (.*)
            tag_name: $$1
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection
    resource:
      attributes:
        - action: upsert
          key: service.name
          from_attribute: k8s.container.name

  exporters:
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: otelcol
      resource_to_telemetry_conversion:
        enabled: true
    otlphttp/loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    otlp/tempo:
      endpoint: http://tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    debug:
      verbosity: basic

  service:
    extensions: [health_check, file_storage]
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [prometheus]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [otlp/tempo]

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8889"
  prometheus.io/path: "/metrics"

service:
  enabled: true
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi