alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: false

server:
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

  retention: "15d"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  service:
    type: ClusterIP
    servicePort: 80

  extraScrapeConfigs: |
    - job_name: 'otel-collector'
      static_configs:
        - targets: ['otel-collector.monitoring.svc.cluster.local:8889']
      metrics_path: /metrics

    - job_name: 'node-exporter-docker'
      # Docker로 띄운 node_exporter (172.25.0.1:9100)
      static_configs:
        - targets: ['172.25.0.1:9100']
      relabel_configs:
        - target_label: instance
          replacement: 'mini-pc'

    - job_name: 'kubernetes-pods-annotated'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names: [linkat-dev, linkat-prod, monitoring]
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: 'true'
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: kubernetes_pod_name

rbac:
  create: true

serviceAccounts:
  server:
    create: true