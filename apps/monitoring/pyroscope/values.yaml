pyroscope:
  replicaCount: 1

  image:
    repository: grafana/pyroscope
    tag: "2.1.0"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraArgs:
    storage.filesystem.dir: /data

persistence:
  enabled: true
  size: 5Gi

grafana:
  enabled: false

alloy:
  enabled: false