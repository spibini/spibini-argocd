apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: nginx-config
    behavior: replace
    files:
      - default.conf

patches:
  - target:
      kind: Deployment
      name: nginx-image-server
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/1/hostPath/path
        value: /home/deploy/images/dev

  - target:
      kind: Service
      name: nginx-image-server-service
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30080
