apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pv.yml

nameSuffix: -dev

patches:
  - target:
      kind: Service
      name: nginx-service
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30080

  - target:
      kind: Deployment
      name: nginx-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "dev-cdn.link-at.store"

patchesJson6902:
  - target:
      kind: PersistentVolumeClaim
      name: nginx-image-pvc
    patch: |-
      - op: replace
        path: /spec/volumeName
        value: nginx-image-pv
