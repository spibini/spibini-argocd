apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          env:
            - name: NGINX_SERVER_NAME
              value: "_"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf
              readOnly: true
            - name: image-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: config-volume
          configMap:
            name: nginx-config
        - name: image-storage
          persistentVolumeClaim:
            claimName: nginx-image-pvc
