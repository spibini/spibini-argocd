image:
  repository: qcov/linkat
  tag: latest

replicaCount: 1

service:
  type: NodePort
  port: 8080
  nodePort: 30090

secretName: linkat-dev-env

otel:
  enabled: true
  endpoint: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  serviceName: "linkat-dev-server"
  protocol: "http/protobuf"
  tracesExporter: "otlp"
  javaAgentLogging: "application"