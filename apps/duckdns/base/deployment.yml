apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckdns
  labels:
    app: duckdns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duckdns
  template:
    metadata:
      labels:
        app: duckdns
    spec:
      containers:
        - name: duckdns
          image: lscr.io/linuxserver/duckdns:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Asia/Seoul
            - name: SUBDOMAINS
              value: "qcov-server"
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: duckdns-secret
                  key: token
            - name: LOG_FILE
              value: "false"
