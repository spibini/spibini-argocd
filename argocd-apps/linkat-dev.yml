apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkat-dev-data
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/spibini/spibini-argocd.git"
    targetRevision: HEAD
    path: apps/linkat/data/overlays/dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: linkat-dev
  syncPolicy:
    automated: null

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkat-dev-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/spibini/spibini-argocd.git"
    targetRevision: HEAD
    path: apps/linkat/app/overlays/dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: linkat-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
